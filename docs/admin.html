<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Earthwell — Admin: Log Batch</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .admin-card {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1.5rem;
      box-shadow: 0 2px 8px rgba(45, 90, 39, 0.08);
    }
    .form-group {
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
      margin-bottom: 1rem;
    }
    .form-group label {
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--muted);
    }
    .form-group input,
    .form-group select {
      padding: 0.55rem 0.75rem;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 0.95rem;
      font-family: inherit;
      color: var(--text);
      background: var(--white);
    }
    .form-group input:focus,
    .form-group select:focus {
      outline: none;
      border-color: var(--green-mid);
    }
    .form-group input[readonly] {
      background: var(--green-light);
      color: var(--green-dark);
      font-weight: bold;
      cursor: default;
    }
    .label-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .label-row a {
      font-size: 0.75rem;
      color: var(--green-mid);
      text-decoration: none;
    }
    .label-row a:hover { text-decoration: underline; }
    .btn {
      display: inline-block;
      padding: 0.65rem 1.4rem;
      border: none;
      border-radius: 6px;
      font-size: 0.95rem;
      font-family: inherit;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-primary { background: var(--green-dark); color: var(--white); }
    .btn-secondary { background: var(--green-light); color: var(--green-dark); border: 1px solid var(--border); }
    .btn:hover:not(:disabled) { opacity: 0.85; }
    .wallet-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.5rem;
      padding: 0.75rem 1rem;
      background: var(--green-light);
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 0.9rem;
    }
    .wallet-address { font-family: monospace; color: var(--green-dark); }
    #toast {
      display: none;
      margin-top: 1rem;
      padding: 0.75rem 1rem;
      border-radius: 6px;
      font-size: 0.9rem;
    }
    #toast.success { background: #e8f5e2; color: var(--green-dark); border: 1px solid var(--border); }
    #toast.error   { background: #fde8e8; color: #a03030; border: 1px solid #f5c0c0; }
    #toast a { color: inherit; }
    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 0 1rem; }
    @media (max-width: 480px) { .two-col { grid-template-columns: 1fr; } }

    /* ── Weather panel ── */
    .weather-panel {
      display: none;
      margin-bottom: 1rem;
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
    }
    .weather-panel.visible { display: block; }
    .weather-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.6rem 0.9rem;
      background: var(--green-light);
      font-size: 0.8rem;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--green-dark);
    }
    .weather-status { font-style: italic; font-weight: normal; color: var(--muted); }
    .weather-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.85rem;
    }
    .weather-table th {
      padding: 0.4rem 0.75rem;
      text-align: left;
      font-size: 0.75rem;
      font-weight: normal;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
      background: #fafef9;
    }
    .weather-table td {
      padding: 0.4rem 0.75rem;
      border-bottom: 1px solid var(--border);
      color: var(--text);
    }
    .weather-table tr:last-child td { border-bottom: none; }
    .weather-table tr:hover td { background: var(--green-light); }
    .weather-summary {
      padding: 0.5rem 0.9rem;
      font-size: 0.82rem;
      color: var(--muted);
      border-top: 2px solid var(--border);
      background: #fafef9;
    }
    .rain-dot { color: #4a8cdf; }
  </style>
</head>
<body>
  <header>
    <div class="header-inner"><div class="logo">Earthwell</div>
    <p class="tagline">Admin — Log Harvest Batch</p>
  </header>

  <main>
    <div class="wallet-bar">
      <span id="wallet-status">Not connected</span>
      <button class="btn btn-secondary" id="connect-btn" onclick="connectWallet()">Connect Wallet</button>
    </div>

    <div class="admin-card">
      <form id="batch-form" onsubmit="submitBatch(event)">

        <div class="two-col">
          <div class="form-group">
            <label>Product Name *</label>
            <select id="productName" required onchange="onProductChange()">
              <option value="">— Select product —</option>
              <option value="Eggs">Eggs</option>
            </select>
          </div>
          <div class="form-group">
            <label>Batch ID</label>
            <input type="text" id="batchId" readonly placeholder="Auto-generated" />
          </div>
        </div>

        <div class="two-col">
          <div class="form-group">
            <div class="label-row">
              <label>Producer *</label>
              <a href="producers.html">+ Manage producers</a>
            </div>
            <select id="producerSelect" required onchange="onProducerChange()">
              <option value="">— Select producer —</option>
            </select>
          </div>
          <div class="form-group">
            <label>Location</label>
            <input type="text" id="origin" readonly placeholder="Auto-filled from producer" />
          </div>
        </div>

        <div class="form-group" style="display:none;">
          <input type="text" id="farmerName" />
        </div>

        <div class="form-group">
          <label>Harvest Date *</label>
          <input type="date" id="harvestDate" required onchange="onHarvestDateChange()" />
        </div>

        <div class="weather-panel" id="weather-panel">
          <div class="weather-header">
            <span>Harvest Period Weather</span>
            <span class="weather-status" id="weather-status">Loading…</span>
          </div>
          <table class="weather-table" id="weather-table" style="display:none;">
            <thead>
              <tr>
                <th>Date</th>
                <th>High (°F)</th>
                <th>Low (°F)</th>
                <th>Rain (in)</th>
                <th>Wind (mph)</th>
              </tr>
            </thead>
            <tbody id="weather-body"></tbody>
          </table>
          <div class="weather-summary" id="weather-summary" style="display:none;"></div>
        </div>

        <div class="form-group">
          <label>Certifications</label>
          <input type="text" id="certifications" placeholder="USDA Organic, Non-GMO" />
        </div>
        <button class="btn btn-primary" type="submit" id="submit-btn" disabled>
          Log Batch on Blockchain
        </button>
      </form>

      <div id="toast"></div>
    </div>
  </main>

  <footer>
    <p>Owner-only. Transactions are permanent and on-chain. &nbsp;·&nbsp; <a href="producers.html">Producers ↗</a> &nbsp;·&nbsp; <a href="inventory.html">Inventory ↗</a> &nbsp;·&nbsp; <a href="index.html?batch=">View trace page ↗</a></p>
  </footer>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.11.1/ethers.umd.min.js"></script>
  <script src="admin.js"></script>
</body>
</html>
